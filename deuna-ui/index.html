<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Deuna Negocios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="phone-wrapper">

    <!-- STATUS BAR -->
    <div class="status-bar">
      <span class="status-time">23:10</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path
            d="M8 2.4C10.5 2.4 12.7 3.5 14.2 5.2L15.5 3.8C13.6 1.8 11 0.5 8 0.5C5 0.5 2.4 1.8 0.5 3.8L1.8 5.2C3.3 3.5 5.5 2.4 8 2.4Z"
            fill="#333" />
          <path
            d="M8 5.2C9.8 5.2 11.4 5.9 12.6 7L13.9 5.6C12.3 4.2 10.2 3.3 8 3.3C5.8 3.3 3.7 4.2 2.1 5.6L3.4 7C4.6 5.9 6.2 5.2 8 5.2Z"
            fill="#333" />
          <path
            d="M8 8C9.1 8 10.1 8.4 10.9 9.1L12.2 7.7C11 6.8 9.6 6.1 8 6.1C6.4 6.1 5 6.8 3.8 7.7L5.1 9.1C5.9 8.4 6.9 8 8 8Z"
            fill="#333" />
          <circle cx="8" cy="11" r="1.2" fill="#333" />
        </svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <rect x="0" y="4" width="2.5" height="8" rx="1" fill="#333" />
          <rect x="3.5" y="2.5" width="2.5" height="9.5" rx="1" fill="#333" />
          <rect x="7" y="1" width="2.5" height="11" rx="1" fill="#333" />
          <rect x="10.5" y="0" width="2.5" height="12" rx="1" fill="#ddd" />
          <rect x="14" y="0" width="2" height="12" rx="1" fill="#ddd" />
        </svg>
        <div class="battery-icon">
          <div class="battery-body">
            <div class="battery-fill" style="width:72%"></div>
          </div>
          <div class="battery-tip"></div>
          <span class="battery-text">72</span>
        </div>
      </div>
    </div>

    <!-- SCROLLABLE CONTENT -->
    <div class="scroll-area">

      <!-- HEADER -->
      <header class="app-header">
        <div class="header-left">
          <div class="store-avatar">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6B21A8" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
          </div>
          <div class="header-info">
            <div class="header-name-row">
              <span class="header-name">Hola! Maria</span>
              <span class="badge-admin">Admin</span>
            </div>
            <span class="header-sub">Chalan Paladinez Maria...</span>
          </div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" aria-label="QR">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
              <rect x="5" y="5" width="3" height="3" fill="#333" stroke="none" />
              <rect x="16" y="5" width="3" height="3" fill="#333" stroke="none" />
              <rect x="5" y="16" width="3" height="3" fill="#333" stroke="none" />
              <line x1="14" y1="14" x2="14" y2="14" />
              <line x1="17" y1="14" x2="21" y2="14" />
              <line x1="14" y1="17" x2="14" y2="21" />
              <line x1="21" y1="17" x2="21" y2="21" />
              <line x1="17" y1="17" x2="17" y2="17" />
            </svg>
          </button>
          <button class="icon-btn" aria-label="Notificaciones">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
          </button>
          <button class="icon-btn" aria-label="Soporte">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 18v-6a9 9 0 0 1 18 0v6" />
              <path
                d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z" />
            </svg>
          </button>
        </div>
      </header>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab tab--inactive" id="tab-cobrar">Cobrar</button>
        <button class="tab tab--active" id="tab-gestionar">Gestionar</button>
      </div>

      <!-- MAIN CONTENT -->
      <main class="main-content">

        <!-- BALANCE CARD -->
        <div class="balance-card">
          <span class="balance-label">Mi Saldo</span>
          <div class="balance-row">
            <div class="balance-amount">
              <span class="balance-currency">$</span>
              <span class="balance-stars">********</span>
              <button class="eye-btn" aria-label="Mostrar/ocultar saldo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
            <button class="chevron-btn" aria-label="Ver detalle">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6" />
              </svg>
            </button>
          </div>
        </div>

        <!-- QUICK ACCESS -->
        <section class="section">
          <h2 class="section-title">Accesos rápidos</h2>
          <div class="quick-grid">

            <div class="quick-item">
              <button class="quick-btn" aria-label="Recargar saldo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19" />
                  <polyline points="19 12 12 19 5 12" />
                </svg>
              </button>
              <span class="quick-label">Recargar<br>saldo</span>
            </div>

            <div class="quick-item">
              <button class="quick-btn" aria-label="Transferir saldo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="19" x2="12" y2="5" />
                  <polyline points="5 12 12 5 19 12" />
                </svg>
              </button>
              <span class="quick-label">Transferir<br>saldo</span>
            </div>

            <div class="quick-item">
              <button class="quick-btn" aria-label="Venta Manual">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="1" x2="12" y2="23" />
                  <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                </svg>
              </button>
              <span class="quick-label">Venta<br>Manual</span>
            </div>

            <div class="quick-item">
              <button class="quick-btn" aria-label="Verificar pago">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                  <polyline points="9 12 11 14 15 10" />
                </svg>
              </button>
              <span class="quick-label">Verificar<br>pago</span>
            </div>

          </div>
        </section>

        <!-- NEWS SECTION -->
        <section class="section">
          <h2 class="section-title">Novedades Deuna Negocios</h2>
          <div class="news-grid">

            <div class="news-card">
              <p class="news-text">Agrega vendedores a tu equipo</p>
              <div class="news-logo-wrap">
                <div class="deuna-logo">
                  <span class="deuna-d">d!</span>
                  <span class="deuna-sub">negocios</span>
                </div>
              </div>
            </div>

            <div class="news-card">
              <p class="news-text">Administra tus ventas con tu caja</p>
              <div class="news-logo-wrap">
                <div class="deuna-logo">
                  <span class="deuna-d">d!</span>
                  <span class="deuna-sub">negocios</span>
                </div>
              </div>
            </div>

          </div>
        </section>

        <!-- SPACER for navbar -->
        <div style="height: 24px;"></div>

      </main>
    </div>

    <!-- BOTTOM NAVBAR -->
    <nav class="bottom-nav">
      <button class="nav-item nav-item--active" aria-label="Inicio">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#5B21B6" stroke="none">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
        </svg>
        <span>Inicio</span>
      </button>
      <button class="nav-item" aria-label="Mi Caja">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2" />
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
          <line x1="12" y1="12" x2="12" y2="16" />
          <line x1="10" y1="14" x2="14" y2="14" />
        </svg>
        <span>Mi Caja</span>
      </button>
      <button class="nav-item" aria-label="Menú">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"
          stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
        <span>Menú</span>
      </button>
    </nav>


  </div><!-- /phone-wrapper -->
</body>

</html>
