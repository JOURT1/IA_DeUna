services:
  - type: web
    name: deuna-app
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm run build && cd server && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LLM_PROVIDER
        value: noop
